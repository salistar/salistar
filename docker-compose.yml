services:
  salistar-portfolio:
    image: ghcr.io/salistar/salistar-portfolio:latest
    container_name: salistar-portfolio
    pull_policy: always
    restart: always
    ports:
      - '127.0.0.1:4001:3000'
    environment:
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - salistar-network

networks:
  salistar-network:
    name: salistar-network
    driver: bridge
