##############################################################################
# ONE-SHOT — Bascule DNS salistar.com + salorie.salistar.com vers le
# nouveau tunnel cloudflared 'salistar-edge' (serveur 3 Oracle).
#
# Met a jour (PUT) les enregistrements CNAME existants vers la cible
# <tunnel-id>.cfargotunnel.com, proxied. Utilise le secret CF_API_TOKEN
# (scope salistar.com) deja present dans ce repo.
##############################################################################
name: cutover-dns

on:
  workflow_dispatch:

env:
  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
  TARGET: 21e41967-aadf-4d53-8ea6-a187f675c5a2.cfargotunnel.com

jobs:
  cutover:
    runs-on: ubuntu-latest
    steps:
      - name: Repointer les CNAME vers le tunnel serveur 3
        run: |
          set -e
          [ -z "$CF_API_TOKEN" ] && { echo "CF_API_TOKEN manquant"; exit 1; }
          if [ -z "$CF_ZONE_ID" ]; then
            CF_ZONE_ID=$(curl -fsS "https://api.cloudflare.com/client/v4/zones?name=salistar.com" \
              -H "Authorization: Bearer $CF_API_TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin)['result'][0]['id'])")
          fi
          echo "zone=$CF_ZONE_ID"
          for NAME in salistar.com salorie.salistar.com; do
            RID=$(curl -fsS "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$NAME" \
              -H "Authorization: Bearer $CF_API_TOKEN" | python3 -c "import sys,json;r=json.load(sys.stdin)['result'];print(r[0]['id'] if r else '')")
            BODY=$(python3 -c "import json;print(json.dumps({'type':'CNAME','name':'$NAME','content':'$TARGET','proxied':True,'ttl':1}))")
            if [ -n "$RID" ]; then
              R=$(curl -fsS -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$RID" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" --data "$BODY")
            else
              R=$(curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
                -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" --data "$BODY")
            fi
            echo "$NAME -> $(echo "$R" | python3 -c "import sys,json;d=json.load(sys.stdin);print('OK' if d.get('success') else 'FAIL '+str(d.get('errors')))")"
          done
